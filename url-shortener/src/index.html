<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Involvex URL Shortener</title>
		<link
			rel="icon"
			type="image/png"
			href="https://img.icons8.com/external-dreamstale-green-shadow-dreamstale/50/000000/external-atom-energy-and-ecology-dreamstale-green-shadow-dreamstale.png"
		/>
		<link
			href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;700&display=swap"
			rel="stylesheet"
		/>
		<script
			src="https://kit.fontawesome.com/15181efa86.js"
			crossorigin="anonymous"
		></script>
		<link
			rel="stylesheet"
			href="https://unpkg.com/bulma@0.9.0/css/bulma.min.css"
		/>
		<script
			src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback"
			async
			defer
		></script>
		<!-- Google tag (gtag.js) -->
		<script
			async
			src="https://www.googletagmanager.com/gtag/js?id=G-6J3E1FBFRM"
		></script>
		<script>
			window.dataLayer = window.dataLayer || []
			function gtag() {
				dataLayer.push(arguments)
			}
			gtag('js', new Date())

			gtag('config', 'G-6J3E1FBFRM')
		</script>
		<script>
			let sitekey = '0x4AAAAAACkURlXHUh-8pW1d'
			let turnstileToken

			window.onloadTurnstileCallback = function () {
				const turnstileOptions = {
					sitekey,
					theme: 'light',
					callback: function (token) {
						turnstileToken = token
					},
				}
				turnstile.render('#cf-turnstile-widget', turnstileOptions)
			}

			const submitURL = async () => {
				const statusElement = document.getElementById('status')
				const originalUrlElement = document.getElementById('url')

				if (!originalUrlElement.reportValidity()) {
					throw new Error('Invalid URL.')
				}

				statusElement.classList.add('is-loading')

				const originalUrl = originalUrlElement.value
				const body = JSON.stringify({originalUrl, turnstileToken})

				const res = await fetch('/api/url', {method: 'POST', body})
				statusElement.classList.remove('is-loading')

				if (res.status === 200) {
					const {shortUrl} = await res.json()
					statusElement.innerHTML = shortUrl
				} else {
					statusElement.innerHTML = `⛔ ${res.statusText}`
				}

				originalUrlElement.value = ''
				turnstile.reset('#cf-turnstile-widget')
			}

			const copyToClipboard = elementId => {
				var aux = document.createElement('input')
				aux.setAttribute('value', document.getElementById(elementId).innerHTML)

				document.body.appendChild(aux)
				aux.select()
				document.execCommand('copy')
				document.body.removeChild(aux)
			}
		</script>
	</head>
	<body>
		<section class="container">
			<div class="columns is-multiline">
				<div class="column is-8 is-offset-2 register">
					<h1 class="title is-1">Involvex Url Shortener</h1>

					<h1 class="title is-4">Shorten A URL</h1>
					<div class="icon-text">
						<span class="icon has-text-info">
							<i class="fas fa-info-circle"></i>
						</span>
						<span class="description">Enter a valid URL to shorten</span>
					</div>
					<br />
					<div class="field">
						<div class="control">
							<input
								class="input is-link is-primary is-medium is-rounded"
								type="url"
								placeholder="https://dev.involvex.workers.dev/"
								id="url"
								required
							/>
						</div>
					</div>
					<div class="checkbox mb-3">
						<!-- The Turnstile widget will be injected in the following div. -->
						<div id="cf-turnstile-widget"></div>
						<!-- end. -->
					</div>
					<button
						id="submit"
						class="button is-block is-primary is-rounded is-fullwidth is-medium"
						onclick="submitURL()"
					>
						Shorten
					</button>
					<br />
					<button
						title="Copy to Clipboard"
						class="button is-info is-rounded is-small"
						onclick="copyToClipboard('status')"
					>
						<span class="icon">
							<i class="fas fa-copy"></i>
						</span>
						<span id="status"></span>
					</button>
				</div>
			</div>
		</section>
	</body>
	<style>
		:root {
			--brandColor: hsl(166, 67%, 51%);
			--background: rgb(247, 247, 247);
			--textDark: hsla(0, 0%, 0%, 0.66);
			--textLight: hsla(0, 0%, 0%, 0.33);
		}
		body {
			background: var(--background);
			height: 100vh;
			color: var(--textDark);
		}
		.field:not(:last-child) {
			margin-bottom: 1rem;
		}
		.register {
			margin-top: 10rem;
			background: white;
			border-radius: 10px;
		}
		.left,
		.right {
			padding: 4.5rem;
		}
		.left {
			border-right: 5px solid var(--background);
		}
		.left .title {
			font-weight: 800;
			letter-spacing: -2px;
		}
		.left .colored {
			color: var(--brandColor);
			font-weight: 500;
			margin-top: 1rem !important;
			letter-spacing: -1px;
		}
		.left p {
			color: var(--textLight);
			font-size: 1.15rem;
		}
		.right .title {
			font-weight: 800;
			letter-spacing: -1px;
		}
		.right .description {
			margin-top: 1rem;
			margin-bottom: 1rem !important;
			color: var(--textLight);
			font-size: 1.15rem;
		}
		.right small {
			color: var(--textLight);
		}
		input {
			font-size: 1rem;
		}
		input:focus {
			border-color: var(--brandColor) !important;
			box-shadow: 0 0 0 1px var(--brandColor) !important;
		}
		.fab,
		.fas {
			color: var(--textLight);
			margin-right: 1rem;
		}
	</style>
</html>
